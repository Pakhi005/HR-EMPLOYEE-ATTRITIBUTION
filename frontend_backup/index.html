<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Attrition Predictor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Employee Attrition <span>Predictor</span></h1>
            <p>Enter the employee details below to predict their attrition risk in real-time.</p>
        </header>

        <main class="dashboard">
            <div class="form-panel glass-card">
                <h2>Employee Profile</h2>
                <form id="prediction-form">
                    <div id="dynamic-fields" class="form-grid">
                        <!-- Fields injected by JS -->
                    </div>
                    <button type="submit" id="predict-btn" class="glow-on-hover">Generate Prediction</button>
                </form>
            </div>

            <div class="result-panel glass-card">
                <h2>Risk Analysis</h2>
                <div id="result-content" class="hidden">
                    <div class="gauge-container">
                        <div class="risk-badge" id="risk-badge">Low Risk</div>
                        <div class="gauge-circle">
                            <svg viewBox="0 0 36 36" class="circular-chart">
                                <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <path class="circle" id="probability-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                <text x="18" y="20.35" class="percentage" id="probability-text">0%</text>
                            </svg>
                        </div>
                    </div>
                    
                    <div class="factors-section">
                        <h3>Key Driving Factors</h3>
                        <ul id="top-factors-list" class="factors-list">
                            <!-- Factors injected by JS -->
                        </ul>
                    </div>
                </div>
                
                <div id="empty-state">
                    <div class="pulse-ring"></div>
                    <p>Submit the form to generate risk analysis.</p>
                </div>

                <div id="loading-state" class="hidden">
                    <div class="loader"></div>
                    <p>Analyzing profile...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
